# https://sw.kovidgoyal.net/kitty/conf/

# --- Font ---
font_family      FiraCode Nerd Font Mono
font_size        12.0

# --- Window ---
window_padding_width 8

# Transparency (blur must be configured in the compositor)
background_opacity 0.8

confirm_os_window_close 0
wayland_titlebar_color background

# --- Cursor ---
cursor_shape           underline
cursor_underline_thickness 2
cursor_blink_interval  0

# --- Shell ---
shell fish
shell_integration no-cursor

# --- Scrollback ---
scrollback_lines 10000

# --- Behavior ---
copy_on_select          yes
strip_trailing_spaces   smart
enable_audio_bell       no
mouse_hide_wait         3.0

# --- Tab bar ---
tab_bar_style hidden

# --- Dark Pastel theme ---
background            #1C1C1C
foreground            #DEDEDE
selection_background  #DEDEDE
selection_foreground  #1C1C1C
cursor                #F8F8F8

# Black
color0  #1C1C1C
color8  #555753
# Red
color1  #FF6C60
color9  #FF6C60
# Green
color2  #A8FF60
color10 #A8FF60
# Yellow
color3  #FFFFB6
color11 #FFFFB6
# Blue
color4  #96CBFE
color12 #96CBFE
# Magenta
color5  #FF73FE
color13 #FF73FE
# Cyan
color6  #C6C5FE
color14 #C6C5FE
# White
color7  #EEEEEE
color15 #EEEEEE
